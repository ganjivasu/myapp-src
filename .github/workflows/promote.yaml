name: Promote Image (PR-based)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment to promote to"
        required: true
        type: choice
        options:
          - pt
          - qa
          - prod
      image:
        description: "Immutable image digest to promote"
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  promote:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout GitOps repo
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ganjivasu/myapp-gitops
          token: ${{ secrets.GITHUBTOKEN }}

      # 2️⃣ Install yq (v4+)
      - name: Install yq
        run: |
          sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/bin/yq
          sudo chmod +x /usr/bin/yq

      # 3️⃣ Create promotion branch and run promotion.sh
      - name: Run Promotion Script
        run: |
          ENV=${{ inputs.environment }}
          IMAGE=${{ inputs.image }}
          BRANCH="promote-myapp-${ENV}-${GITHUB_RUN_ID}"

          git fetch origin main
          git checkout -b "$BRANCH"

          chmod +x scripts/promotion.sh
          scripts/promotion.sh "$ENV" "$IMAGE"

          # Exit gracefully if no changes
          if git diff --quiet main...HEAD; then
            echo "ℹ️ No changes to promote for $ENV, skipping PR creation"
            exit 0
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUBTOKEN }}

      # 4️⃣ Create Pull Request only if branch has commits
      - name: Create Pull Request
        run: |
          ENV=${{ inputs.environment }}
          IMAGE=${{ inputs.image }}
          BRANCH="promote-myapp-${ENV}-${GITHUB_RUN_ID}"

          gh pr create \
            --title "Promote myapp to $ENV" \
            --body "Promoting immutable image $IMAGE to $ENV environment" \
            --base main \
            --head "$BRANCH"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUBTOKEN }}
